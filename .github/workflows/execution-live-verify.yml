name: Execution Live Verify

on:
  workflow_dispatch:

concurrency:
  group: execution-live-verify-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify-live:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          package-manager-cache: false

      - name: Enable Corepack
        run: corepack enable

      - name: Activate pnpm
        run: corepack prepare pnpm@10.29.2 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify execution lane against live Railway
        run: pnpm verify:execution:live
