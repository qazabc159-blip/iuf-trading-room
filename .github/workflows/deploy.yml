name: Deploy to Railway

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      service:
        description: "Service to deploy"
        default: "all"
        type: choice
        options:
          - all
          - web
          - api
          - worker

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    # Only deploy if CI passed (auto), or manual dispatch
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    runs-on: ubuntu-latest
    timeout-minutes: 20

    strategy:
      fail-fast: false
      matrix:
        service: [web, api, worker]

    steps:
      - name: Decide whether this matrix entry should run
        id: gate
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            target="${{ github.event.inputs.service }}"
            if [ "$target" != "all" ] && [ "$target" != "${{ matrix.service }}" ]; then
              echo "skip=true" >> "$GITHUB_OUTPUT"
              echo "Skipping ${{ matrix.service }} — manual dispatch targeted '$target'"
              exit 0
            fi
          fi
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Checkout
        if: steps.gate.outputs.skip != 'true'
        uses: actions/checkout@v4

      - name: Install Railway CLI
        if: steps.gate.outputs.skip != 'true'
        run: npm install -g @railway/cli@latest

      - name: Deploy ${{ matrix.service }}
        if: steps.gate.outputs.skip != 'true'
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          if [ -z "$RAILWAY_TOKEN" ]; then
            echo "::error::RAILWAY_TOKEN secret is not set. Create a project token in Railway dashboard (Project → Settings → Tokens) and add it as a GitHub Actions secret named RAILWAY_TOKEN."
            exit 1
          fi
          railway up --service ${{ matrix.service }} --ci --message "GHA deploy ${{ github.sha }}"

      # Post-deploy migration verify (api service only).
      # Railway runs pnpm migrate inside the container via start-api-railway.mjs
      # (RAILPACK_START_CMD=pnpm start:api:railway) before the API boots.
      # This step waits for the API to be healthy and then checks that all
      # expected migrations applied (via /api/v1/paper/db-probe).
      # Failure here is a WARNING (not a block) — it surfaces evidence for Bruce.
      - name: Verify migrations applied (api only)
        if: steps.gate.outputs.skip != 'true' && matrix.service == 'api'
        continue-on-error: true
        run: |
          echo "Waiting 30s for api to boot after deploy..."
          sleep 30
          HEALTH=$(curl -sf --max-time 10 https://api.eycvector.com/health || echo "UNREACHABLE")
          echo "Health: $HEALTH"
          PROBE=$(curl -sf --max-time 10 \
            -H "Cookie: $(curl -sf --max-time 10 -c /tmp/cookies.txt \
              -X POST https://api.eycvector.com/auth/login \
              -H 'Content-Type: application/json' \
              -d '{"email":"${{ secrets.SEED_OWNER_EMAIL || 'qazabc159@gmail.com' }}","password":"${{ secrets.SEED_OWNER_PASSWORD || 'qazabc159' }}"}' \
              -b /tmp/cookies.txt > /dev/null && cat /tmp/cookies.txt | grep session | awk '{print $6"="$7}')" \
            https://api.eycvector.com/api/v1/paper/db-probe 2>/dev/null || echo "PROBE_FAILED")
          echo "DB probe: $PROBE"
          # Extract applied migration count for audit log
          COUNT=$(echo "$PROBE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('appliedMigrationsCount','?'))" 2>/dev/null || echo "?")
          STRATEGY_RUNS=$(echo "$PROBE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('tables',{}).get('strategy_runs','?'))" 2>/dev/null || echo "?")
          echo "::notice::Applied migrations: $COUNT | strategy_runs table: $STRATEGY_RUNS | sha: ${{ github.sha }}"
          if [ "$STRATEGY_RUNS" = "False" ] || [ "$STRATEGY_RUNS" = "false" ]; then
            echo "::warning::strategy_runs table NOT present after deploy — migration may have failed. Check Railway logs."
          fi
