name: Deploy to Railway

on:
  workflow_run:
    workflows: ["CI — Security Baseline (all PRs)"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      service:
        description: "Service to deploy"
        default: "all"
        type: choice
        options:
          - all
          - web
          - api
          - worker

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    # Only deploy if CI passed (auto), or manual dispatch
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    runs-on: ubuntu-latest
    timeout-minutes: 20

    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        service: [web, api, worker]

    steps:
      - name: Decide whether this matrix entry should run
        id: gate
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            target="${{ github.event.inputs.service }}"
            if [ "$target" != "all" ] && [ "$target" != "${{ matrix.service }}" ]; then
              echo "skip=true" >> "$GITHUB_OUTPUT"
              echo "Skipping ${{ matrix.service }} — manual dispatch targeted '$target'"
              exit 0
            fi
          fi
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Checkout
        if: steps.gate.outputs.skip != 'true'
        uses: actions/checkout@v4

      - name: Install Railway CLI
        if: steps.gate.outputs.skip != 'true'
        run: npm install -g @railway/cli@latest

      - name: Deploy ${{ matrix.service }}
        if: steps.gate.outputs.skip != 'true'
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          if [ -z "$RAILWAY_TOKEN" ]; then
            echo "::error::RAILWAY_TOKEN secret is not set. Create a project token in Railway dashboard and add it as a GitHub Actions secret named RAILWAY_TOKEN."
            exit 1
          fi

          railway up --service ${{ matrix.service }} --ci --message "GHA deploy ${{ github.sha }}"

      # Post-deploy migration verify (api service only).
      # Railway runs pnpm migrate inside the container via start-api-railway.mjs
      # before the API boots. This step waits for the API to be healthy and then
      # checks whether expected migrations applied through /api/v1/paper/db-probe.
      #
      # Security:
      # - Does not print credentials to logs.
      # - SEED_OWNER_EMAIL / SEED_OWNER_PASSWORD secrets are REQUIRED (hard-fail if missing).
      #   Root cause 2026-05-18: Route B (skip-on-missing-secrets) allowed 6 silent failures.
      #   Route B is permanently removed. Both secrets must be set in GHA secrets.
      # - If verify fails for any reason, deploy is BLOCKED (exit 1).
      # - EXPECTED_MIGRATION_COUNT must be updated in Railway env vars when new migrations are added.
      #   Current prod value: 43. Repo has 41 current forward files through 0042, plus
      #   2 legacy applied rows from earlier migration history.
      - name: Verify migrations applied (api only)
        if: steps.gate.outputs.skip != 'true' && matrix.service == 'api'
        continue-on-error: false
        env:
          SEED_OWNER_EMAIL: ${{ secrets.SEED_OWNER_EMAIL }}
          SEED_OWNER_PASSWORD: ${{ secrets.SEED_OWNER_PASSWORD }}
        run: |
          set -euo pipefail

          echo "Waiting 30s for api to boot after deploy..."
          sleep 30

          HEALTH="$(curl -sf --max-time 10 https://api.eycvector.com/health || echo "UNREACHABLE")"
          echo "Health: $HEALTH"

          if [ -z "${SEED_OWNER_EMAIL:-}" ] || [ -z "${SEED_OWNER_PASSWORD:-}" ]; then
            echo "::error::SEED_OWNER_EMAIL or SEED_OWNER_PASSWORD secret not set — cannot verify migrations. Add secrets to GHA or deploy will be treated as unverified."
            echo "::error::Root cause: 2026-05-18 silent migration failure caused prod schema drift. Route B (skip) permanently removed."
            exit 1
          fi

          COOKIE_JAR="/tmp/iuf_cookies.txt"
          LOGIN_PAYLOAD="/tmp/iuf_login_payload.json"
          LOGIN_RESPONSE="/tmp/iuf_login_response.json"
          PROBE_RESPONSE="/tmp/iuf_db_probe.json"

          python3 - <<'PY' > "$LOGIN_PAYLOAD"
          import json
          import os

          print(json.dumps({
              "email": os.environ["SEED_OWNER_EMAIL"],
              "password": os.environ["SEED_OWNER_PASSWORD"],
          }))
          PY

          LOGIN_STATUS="$(
            curl -sS --max-time 10 \
              -o "$LOGIN_RESPONSE" \
              -w "%{http_code}" \
              -c "$COOKIE_JAR" \
              -b "$COOKIE_JAR" \
              -X POST "https://api.eycvector.com/auth/login" \
              -H "Content-Type: application/json" \
              --data-binary "@$LOGIN_PAYLOAD"
          )"

          rm -f "$LOGIN_PAYLOAD"

          if [ "$LOGIN_STATUS" != "200" ]; then
            echo "::warning::Post-deploy login failed with HTTP $LOGIN_STATUS. Check SEED_OWNER_EMAIL / SEED_OWNER_PASSWORD secrets and API auth logs."
            exit 1
          fi

          PROBE_STATUS="$(
            curl -sS --max-time 10 \
              -o "$PROBE_RESPONSE" \
              -w "%{http_code}" \
              -b "$COOKIE_JAR" \
              "https://api.eycvector.com/api/v1/paper/db-probe"
          )"

          if [ "$PROBE_STATUS" != "200" ]; then
            echo "::warning::DB probe failed with HTTP $PROBE_STATUS. Check API logs and migration status."
            exit 1
          fi

          COUNT="$(
            python3 - <<'PY'
          import json

          try:
              with open("/tmp/iuf_db_probe.json", "r", encoding="utf-8") as f:
                  raw = json.load(f)
              data = raw.get("data", raw) if isinstance(raw, dict) else {}
              print(data.get("appliedMigrationsCount", "?"))
          except Exception:
              print("?")
          PY
          )"

          STRATEGY_RUNS="$(
            python3 - <<'PY'
          import json

          try:
              with open("/tmp/iuf_db_probe.json", "r", encoding="utf-8") as f:
                  raw = json.load(f)
              data = raw.get("data", raw) if isinstance(raw, dict) else {}
              tables = data.get("tables", {}) if isinstance(data, dict) else {}
              print(tables.get("strategy_runs", "?"))
          except Exception:
              print("?")
          PY
          )"

          echo "::notice::Applied migrations: $COUNT | strategy_runs table: $STRATEGY_RUNS | sha: ${{ github.sha }}"

          if [ "$STRATEGY_RUNS" = "False" ] || [ "$STRATEGY_RUNS" = "false" ]; then
            echo "::error::strategy_runs table NOT present after deploy — migration may have failed. Check Railway logs."
            exit 1
          fi

          # Hard check: migration count must match expected total.
          # UPDATE THIS VALUE whenever a new migration is added.
          # Current prod value: 43 (5/18 PR-A backend gate, migration 0042 v3 status/trigger).
          # Repo has 41 current forward files through 0042, prod schema_migrations contains
          # 2 legacy applied rows from earlier migration history = 41 + 2 = 43 total.
          # Root cause 2026-05-18: this was 31 (stale), allowing 6 undetected migration failures.
          EXPECTED_MIGRATION_COUNT=43
          if [ "$COUNT" != "$EXPECTED_MIGRATION_COUNT" ]; then
            echo "::error::Migration count mismatch: expected $EXPECTED_MIGRATION_COUNT but got $COUNT. Check Railway boot logs for advisory lock contention or migration errors."
            exit 1
          fi

          echo "::notice::Migration count verified: $COUNT/$EXPECTED_MIGRATION_COUNT OK"
