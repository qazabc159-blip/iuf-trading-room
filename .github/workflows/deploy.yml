name: Deploy to Railway

on:
  workflow_run:
    workflows: ["CI — Validate (code changes only)"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      service:
        description: "Service to deploy"
        default: "all"
        type: choice
        options:
          - all
          - web
          - api
          - worker

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    # Only deploy if CI passed (auto), or manual dispatch.
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    # Use the EC2 self-hosted runner by default. GitHub-hosted billing limits
    # previously prevented deploy jobs from even starting.
    runs-on: ${{ vars.USE_SELF_HOSTED == 'false' && 'ubuntu-latest' || fromJSON('["self-hosted", "iuf-prod"]') }}
    timeout-minutes: 20

    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        service: [web, api, worker]

    steps:
      - name: Decide whether this matrix entry should run
        id: gate
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $target = "${{ github.event.inputs.service }}"
            if ($target -ne "all" -and $target -ne "${{ matrix.service }}") {
              "skip=true" >> $env:GITHUB_OUTPUT
              Write-Host "Skipping ${{ matrix.service }} - manual dispatch targeted '$target'"
              exit 0
            }
          }
          "skip=false" >> $env:GITHUB_OUTPUT

      - name: Checkout
        if: steps.gate.outputs.skip != 'true'
        uses: actions/checkout@v4

      - name: Install Railway CLI
        if: steps.gate.outputs.skip != 'true'
        shell: pwsh
        run: npm install -g @railway/cli@latest

      - name: Deploy ${{ matrix.service }}
        if: steps.gate.outputs.skip != 'true'
        shell: pwsh
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:RAILWAY_TOKEN)) {
            Write-Error "::error::RAILWAY_TOKEN secret is not set. Create a project token in Railway dashboard and add it as a GitHub Actions secret named RAILWAY_TOKEN."
            exit 1
          }

          $railway = if ($IsWindows) { "railway.cmd" } else { "railway" }
          & $railway up --service "${{ matrix.service }}" --ci --message "GHA deploy $env:GITHUB_SHA"
          if ($LASTEXITCODE -ne 0) {
            exit $LASTEXITCODE
          }

      # Post-deploy migration verify (api service only).
      # Railway runs pnpm migrate inside the container via start-api-railway.mjs
      # before the API boots. This step waits for the API to be healthy and then
      # checks whether expected migrations applied through /api/v1/paper/db-probe.
      #
      # Security:
      # - Does not print credentials to logs.
      # - SEED_OWNER_EMAIL / SEED_OWNER_PASSWORD secrets are REQUIRED.
      # - If verify fails for any reason, deploy is BLOCKED.
      # - EXPECTED_MIGRATION_COUNT must be updated in Railway env vars when new migrations are added.
      - name: Verify migrations applied (api only)
        if: steps.gate.outputs.skip != 'true' && matrix.service == 'api'
        continue-on-error: false
        shell: pwsh
        env:
          SEED_OWNER_EMAIL: ${{ secrets.SEED_OWNER_EMAIL }}
          SEED_OWNER_PASSWORD: ${{ secrets.SEED_OWNER_PASSWORD }}
        run: |
          Write-Host "Waiting 30s for api to boot after deploy..."
          Start-Sleep -Seconds 30

          try {
            $health = (Invoke-WebRequest -UseBasicParsing -TimeoutSec 10 -Uri "https://api.eycvector.com/health").Content
          } catch {
            $health = "UNREACHABLE"
          }
          Write-Host "Health: $health"

          if ([string]::IsNullOrWhiteSpace($env:SEED_OWNER_EMAIL) -or [string]::IsNullOrWhiteSpace($env:SEED_OWNER_PASSWORD)) {
            Write-Error "::error::SEED_OWNER_EMAIL or SEED_OWNER_PASSWORD secret not set - cannot verify migrations. Add secrets to GHA or deploy will be treated as unverified."
            exit 1
          }

          $session = New-Object Microsoft.PowerShell.Commands.WebRequestSession
          $loginPayload = @{
            email = $env:SEED_OWNER_EMAIL
            password = $env:SEED_OWNER_PASSWORD
          } | ConvertTo-Json -Compress

          try {
            $login = Invoke-WebRequest `
              -UseBasicParsing `
              -TimeoutSec 10 `
              -WebSession $session `
              -Uri "https://api.eycvector.com/auth/login" `
              -Method Post `
              -ContentType "application/json" `
              -Body $loginPayload
          } catch {
            Write-Warning "Post-deploy login failed. Check SEED_OWNER_EMAIL / SEED_OWNER_PASSWORD secrets and API auth logs."
            exit 1
          }

          if ($login.StatusCode -ne 200) {
            Write-Warning "Post-deploy login failed with HTTP $($login.StatusCode). Check SEED_OWNER_EMAIL / SEED_OWNER_PASSWORD secrets and API auth logs."
            exit 1
          }

          try {
            $probe = Invoke-WebRequest `
              -UseBasicParsing `
              -TimeoutSec 10 `
              -WebSession $session `
              -Uri "https://api.eycvector.com/api/v1/paper/db-probe"
          } catch {
            Write-Warning "DB probe failed. Check API logs and migration status."
            exit 1
          }

          if ($probe.StatusCode -ne 200) {
            Write-Warning "DB probe failed with HTTP $($probe.StatusCode). Check API logs and migration status."
            exit 1
          }

          $raw = $probe.Content | ConvertFrom-Json
          $data = if ($null -ne $raw.data) { $raw.data } else { $raw }
          $count = $data.appliedMigrationsCount
          $strategyRuns = $data.tables.strategy_runs

          Write-Host "::notice::Applied migrations: $count | strategy_runs table: $strategyRuns | sha: $env:GITHUB_SHA"

          if ($strategyRuns -eq $false) {
            Write-Error "::error::strategy_runs table NOT present after deploy - migration may have failed. Check Railway logs."
            exit 1
          }

          # Hard check: migration count must match expected total.
          # Current prod value: 43. Repo has 41 current forward files through 0042,
          # plus 2 legacy applied rows from earlier migration history.
          $expectedMigrationCount = 43
          if ("$count" -ne "$expectedMigrationCount") {
            Write-Error "::error::Migration count mismatch: expected $expectedMigrationCount but got $count. Check Railway boot logs for advisory lock contention or migration errors."
            exit 1
          }

          Write-Host "::notice::Migration count verified: $count/$expectedMigrationCount OK"
