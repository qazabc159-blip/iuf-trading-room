name: Deploy to Railway

# Auto-deploy on every code merge to main. Quality gating happens at the PR
# level (CI — Validate + CI — Security Baseline must pass before merge), so a
# push to main is by definition release-ready.
#
# Deliberately NOT chained via workflow_run:
#   - the old chain targeted "CI — Security Baseline (all PRs)", which only
#     runs on pull_request → it never completed on main → auto-deploy never
#     fired (every release 5/30-6/12 was a manual dispatch).
#   - chaining "CI — Validate" instead would deadlock: its Playwright P0 smoke
#     probes prod, so a fix that needs a deploy to turn green (e.g. #1064)
#     would be blocked by the very red bar it is meant to fix.
on:
  push:
    branches: [main]
    # packages/qa-playwright is Playwright test tooling only (not an apps/*
    # workspace dependency - see packages/qa-playwright/package.json) so a
    # push that only touches it does not change what runs in prod. Without
    # this negation, packages/** alone matched it and forced a full
    # web+api+worker redeploy for pure test-spec changes (e.g. #1320, a spec
    # hardening commit with zero runtime code touched). Order matters here:
    # GitHub evaluates path patterns per changed file, last match wins, so
    # the negation must come after the 'packages/**' positive match.
    # reports/**, evidence/**, docs, and other non-code paths were already
    # excluded (never listed below) - this only closes the qa-playwright gap.
    paths:
      - 'apps/**'
      - 'packages/**'
      - '!packages/qa-playwright/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'turbo.json'
      - 'tsconfig*.json'
      - '.npmrc'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:
    inputs:
      service:
        description: "Service to deploy"
        default: "all"
        type: choice
        options:
          - all
          - web
          - api
          - worker

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

defaults:
  run:
    # Self-hosted Windows runners can keep a restrictive machine policy.
    # Use an explicit bypass for GitHub's generated temporary scripts so
    # skip gates and deploy commands do not fail before product code runs.
    shell: pwsh

jobs:
  deploy:
    # push = code merge to main (PR checks already passed); or manual dispatch.
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'push'
    runs-on: ${{ vars.USE_SELF_HOSTED == 'false' && 'ubuntu-latest' || fromJSON('["self-hosted", "iuf-taipei"]') }}
    # 20 -> 35: the post-deploy "Verify migrations applied" step's retry budget
    # was widened (2026-07-21) to tolerate slow-but-healthy api boot (pnpm
    # migrate can take up to ~600s before /health responds). Job timeout must
    # cover that widened budget with headroom, or a genuinely slow-but-healthy
    # boot gets killed by the job timeout instead of passing the verify step.
    timeout-minutes: 35

    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        service: [web, api, worker]

    steps:
      - name: Decide whether this matrix entry should run
        id: gate
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $target = "${{ github.event.inputs.service }}"
            if ($target -ne "all" -and $target -ne "${{ matrix.service }}") {
              "skip=true" >> $env:GITHUB_OUTPUT
              Write-Host "Skipping ${{ matrix.service }} - manual dispatch targeted '$target'"
              exit 0
            }
            "skip=false" >> $env:GITHUB_OUTPUT
            exit 0
          }

          # push event: the outer `on.push.paths` filter already proved this
          # push touches something deploy-relevant. Now scope which of the
          # web/api/worker matrix entries actually need it, so an apps/api-only
          # change does not also redeploy web/worker for nothing.
          #
          # Fail-open by design: if the before/after compare can't be
          # resolved or the API call fails, deploy this service rather than
          # silently skip a real release (same bias as the migration-count
          # check below in this workflow).
          $before = "${{ github.event.before }}"
          $after = "${{ github.sha }}"

          if ([string]::IsNullOrWhiteSpace($before) -or $before -match '^0+$') {
            Write-Host "No comparable base commit (new branch or force-push) - deploying ${{ matrix.service }} to be safe."
            "skip=false" >> $env:GITHUB_OUTPUT
            exit 0
          }

          $changedFiles = @()
          try {
            $headers = @{
              Authorization = "token ${{ github.token }}"
              Accept        = "application/vnd.github+json"
            }
            $compare = Invoke-RestMethod -Uri "https://api.github.com/repos/${{ github.repository }}/compare/$before...$after" -Headers $headers -TimeoutSec 20
            $changedFiles = @($compare.files | ForEach-Object { $_.filename })
          } catch {
            Write-Host "::warning::Could not fetch changed-files compare ($($_.Exception.Message)); deploying ${{ matrix.service }} to be safe."
            "skip=false" >> $env:GITHUB_OUTPUT
            exit 0
          }

          if ($changedFiles.Count -eq 0) {
            Write-Host "::warning::Compare API returned no changed files; deploying ${{ matrix.service }} to be safe."
            "skip=false" >> $env:GITHUB_OUTPUT
            exit 0
          }

          # Anything outside apps/<other-service>/** is treated as shared
          # (packages/*, root config, workflow file) and deploys all three.
          $otherServicePrefixes = @("web", "api", "worker") | Where-Object { $_ -ne "${{ matrix.service }}" } | ForEach-Object { "apps/$_/" }

          $relevant = $changedFiles | Where-Object {
            $f = $_
            $isOtherServiceOnly = $false
            foreach ($p in $otherServicePrefixes) {
              if ($f.StartsWith($p)) { $isOtherServiceOnly = $true }
            }
            -not $isOtherServiceOnly
          }

          if ($relevant.Count -gt 0) {
            "skip=false" >> $env:GITHUB_OUTPUT
            Write-Host "Deploying ${{ matrix.service }} - changed files include: $($relevant -join ', ')"
          } else {
            "skip=true" >> $env:GITHUB_OUTPUT
            Write-Host "Skipping ${{ matrix.service }} - all changed files are scoped to other apps/* services: $($changedFiles -join ', ')"
          }

      - name: Checkout
        if: steps.gate.outputs.skip != 'true'
        uses: actions/checkout@v4

      - name: Setup Node.js
        if: steps.gate.outputs.skip != 'true'
        uses: actions/setup-node@v5
        with:
          node-version: 22
          package-manager-cache: false

      - name: Install Railway CLI
        if: steps.gate.outputs.skip != 'true'
        run: |
          # Keep CI auth stable while Railway CLI 5.3.x ignores RAILWAY_TOKEN
          # and returns "Not signed in" during railway up.
          npm install -g @railway/cli@5.2.0
          railway --version

      - name: Remove non-runtime evidence before Railway upload
        if: steps.gate.outputs.skip != 'true'
        run: |
          $paths = @(
            "evidence",
            "reports",
            "packages/qa-playwright/reports",
            "playwright-report",
            "test-results",
            "coverage"
          )

          foreach ($path in $paths) {
            if (Test-Path -LiteralPath $path) {
              Remove-Item -LiteralPath $path -Recurse -Force
              Write-Host "Removed non-runtime path before Railway upload: $path"
            }
          }

      - name: Preflight production Postgres (api only)
        if: steps.gate.outputs.skip != 'true' && matrix.service == 'api'
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          ./scripts/verify/railway-pg-preflight.ps1 -MinVolumeSizeMB 5000 -MaxUsagePercent 85

      - name: Deploy ${{ matrix.service }}
        if: steps.gate.outputs.skip != 'true'
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:RAILWAY_TOKEN)) {
            Write-Host "::error::RAILWAY_TOKEN secret is not set. Create a project token in Railway dashboard and add it as a GitHub Actions secret named RAILWAY_TOKEN."
            exit 1
          }

          function Test-RailwayDeploymentSuccess {
            param(
              [Parameter(Mandatory = $true)][string]$Service,
              [Parameter(Mandatory = $true)][string]$Message
            )

            # Railway can accept the upload after the CLI times out, then spend
            # several more minutes in INITIALIZING/BUILDING. Treat that as a
            # pending deployment instead of failing early and sending a false
            # red deploy email while production is still converging.
            $deadline = (Get-Date).AddMinutes(12)
            while ((Get-Date) -lt $deadline) {
              try {
                $raw = railway deployment list --service $Service --limit 10 --json 2>&1
                $listExitCode = $LASTEXITCODE
                if ($listExitCode -ne 0) {
                  Write-Host "::warning::railway deployment list failed with exit code $listExitCode for service $Service. Output: $raw"
                } else {
                  $deployments = $raw | ConvertFrom-Json
                  $matched = @(
                    $deployments |
                      Where-Object { $_.meta.cliMessage -eq $Message } |
                      Sort-Object createdAt -Descending |
                      Select-Object -First 1
                  )

                  if ($matched.Count -gt 0) {
                    $deployment = $matched[0]
                    Write-Host "Matched Railway deployment service=$Service id=$($deployment.id) status=$($deployment.status) createdAt=$($deployment.createdAt)"
                    if ($deployment.status -eq "SUCCESS") {
                      return $true
                    }
                  } else {
                    Write-Host "No Railway deployment with message '$Message' found yet for service $Service."
                  }
                }
              } catch {
                Write-Host "::warning::Unable to inspect Railway deployments for service ${Service}: $($_.Exception.Message)"
              }

              Start-Sleep -Seconds 15
            }

            return $false
          }

          $maxAttempts = 3
          $deployMessage = "GHA deploy ${{ github.sha }}"
          for ($attempt = 1; $attempt -le $maxAttempts; $attempt++) {
            if ("${{ matrix.service }}" -eq "api") {
              railway variables --service api --set "RAILWAY_GIT_COMMIT_SHA=${{ github.sha }}" | Out-Null
              Write-Host "Injected RAILWAY_GIT_COMMIT_SHA=${{ github.sha }} for api"
            }
            Write-Host "railway up attempt $attempt/$maxAttempts for service ${{ matrix.service }}"
            railway up --service ${{ matrix.service }} --ci --message "$deployMessage"
            $exitCode = $LASTEXITCODE
            if ($exitCode -eq 0) {
              exit 0
            }
            if ($attempt -eq $maxAttempts) {
              Write-Host "::warning::railway up failed after $maxAttempts attempts with exit code $exitCode. Checking Railway deployment list before failing."
              if (Test-RailwayDeploymentSuccess -Service "${{ matrix.service }}" -Message "$deployMessage") {
                Write-Host "::notice::Railway CLI returned non-zero, but service ${{ matrix.service }} has a SUCCESS deployment for $deployMessage."
                exit 0
              }
              Write-Host "::error::railway up failed and no SUCCESS deployment was observed for service ${{ matrix.service }}."
              exit $exitCode
            }
            $sleepSeconds = 20 * $attempt
            Write-Host "railway up failed with exit code $exitCode; retrying in $sleepSeconds seconds..."
            Start-Sleep -Seconds $sleepSeconds
          }

      # Post-deploy migration verify (api service only).
      # Railway runs pnpm migrate inside the container via start-api-railway.mjs
      # before the API boots. This waits for the API to be healthy and then
      # checks whether expected migrations applied through /api/v1/paper/db-probe.
      - name: Verify migrations applied (api only)
        if: steps.gate.outputs.skip != 'true' && matrix.service == 'api'
        env:
          SEED_OWNER_EMAIL: ${{ secrets.SEED_OWNER_EMAIL }}
          SEED_OWNER_PASSWORD: ${{ secrets.SEED_OWNER_PASSWORD }}
        run: |
          $ErrorActionPreference = "Stop"

          # 45 -> 60: small cushion before the first health probe. The real
          # tolerance for a slow-but-healthy boot comes from the widened
          # login/probe retry loops below, not this fixed sleep.
          Write-Host "Waiting 60s for api to boot after deploy..."
          Start-Sleep -Seconds 60

          # 10 -> 30: this /health call is informational only (its own
          # failure does not exit the step - the login/probe loops below are
          # what actually gate pass/fail), but a slow-boot api (pnpm migrate
          # still running) was timing out here at 10s and printing
          # "UNREACHABLE" even when the api came up healthy moments later,
          # which read as scarier than it was in the job log.
          try {
            $health = Invoke-RestMethod -Uri "https://api.eycvector.com/health" -TimeoutSec 30
            Write-Host "Health: $($health | ConvertTo-Json -Compress)"
          } catch {
            Write-Host "Health: UNREACHABLE (informational only - login/probe retries below are authoritative)"
          }

          if ([string]::IsNullOrWhiteSpace($env:SEED_OWNER_EMAIL) -or [string]::IsNullOrWhiteSpace($env:SEED_OWNER_PASSWORD)) {
            Write-Host "::error::SEED_OWNER_EMAIL or SEED_OWNER_PASSWORD secret not set - cannot verify migrations. Add secrets to GHA or deploy will be treated as unverified."
            Write-Host "::error::Root cause: 2026-05-18 silent migration failure caused prod schema drift. Route B (skip) permanently removed."
            exit 1
          }

          $session = New-Object Microsoft.PowerShell.Commands.WebRequestSession
          $loginPayload = @{
            email = $env:SEED_OWNER_EMAIL
            password = $env:SEED_OWNER_PASSWORD
          } | ConvertTo-Json -Compress
          $payloadPath = Join-Path $env:RUNNER_TEMP "owner-login-payload.json"
          $cookiePath = Join-Path $env:RUNNER_TEMP "owner-login-cookies.txt"
          $loginBodyPath = Join-Path $env:RUNNER_TEMP "owner-login-response.json"
          $probeBodyPath = Join-Path $env:RUNNER_TEMP "db-probe-response.json"
          $curlBin = if ($env:RUNNER_OS -eq "Windows") { "curl.exe" } else { "curl" }
          $utf8NoBom = New-Object System.Text.UTF8Encoding($false)
          [System.IO.File]::WriteAllText($payloadPath, $loginPayload, $utf8NoBom)

          # Retry budget widened 2026-07-21: 6 attempts x (20s max-time + 15s
          # sleep) gave ~195s of tolerance after the 45s initial sleep - too
          # tight when pnpm migrate + api boot can legitimately take up to
          # ~600s. 15 attempts x (25s max-time + 20s sleep) gives ~715s
          # (with the 60s initial sleep), enough to cover that worst case
          # with buffer. This does NOT weaken the check itself: any non-200
          # keeps retrying (except an explicit 401/403 auth failure, which
          # still fails fast as before), and running out of attempts still
          # exits 1.
          $loginMaxAttempts = 15
          $loginResp = $null
          $lastLoginStatus = "unknown"
          for ($attempt = 1; $attempt -le $loginMaxAttempts; $attempt++) {
            $lastLoginStatus = (& $curlBin --silent --show-error --location `
              --request POST "https://api.eycvector.com/auth/login" `
              --header "Content-Type: application/json" `
              --data-binary "@$payloadPath" `
              --cookie-jar "$cookiePath" `
              --output "$loginBodyPath" `
              --write-out "%{http_code}" `
              --max-time 25)
            $curlExit = $LASTEXITCODE

            if ($curlExit -eq 0 -and "$lastLoginStatus" -eq "200") {
              $loginResp = Get-Content $loginBodyPath -Raw
              break
            }

            if ("$lastLoginStatus" -eq "401" -or "$lastLoginStatus" -eq "403") {
              Write-Host "::error::Post-deploy login failed with HTTP $lastLoginStatus. Check SEED_OWNER_EMAIL / SEED_OWNER_PASSWORD secrets and API auth logs."
              exit 1
            }

            if ($attempt -lt $loginMaxAttempts) {
              Write-Host "::warning::Post-deploy login attempt $attempt/$loginMaxAttempts failed with HTTP $lastLoginStatus and curl exit $curlExit; retrying in 20s."
              Start-Sleep -Seconds 20
            }
          }

          if ($null -eq $loginResp) {
            Write-Host "::error::Post-deploy login failed after retries with HTTP $lastLoginStatus. Check API boot/auth logs."
            exit 1
          }

          # Retry budget widened 2026-07-21 alongside the login loop above:
          # 4 attempts x (20s max-time + 15s sleep) -> 6 attempts x (25s
          # max-time + 20s sleep), ~250s of tolerance. By this point login
          # already succeeded (api is up), so this mainly covers the db-probe
          # query itself being slow right after migration completes (cold
          # connection pool / cache). Same non-weakening property as above:
          # only non-200 retries, 401/403 still fails fast, exhausting
          # attempts still exits 1.
          $probeMaxAttempts = 6
          $probeResp = $null
          $lastProbeStatus = "unknown"
          for ($attempt = 1; $attempt -le $probeMaxAttempts; $attempt++) {
            $lastProbeStatus = (& $curlBin --silent --show-error --location `
              "https://api.eycvector.com/api/v1/paper/db-probe" `
              --cookie "$cookiePath" `
              --output "$probeBodyPath" `
              --write-out "%{http_code}" `
              --max-time 25)
            $curlExit = $LASTEXITCODE

            if ($curlExit -eq 0 -and "$lastProbeStatus" -eq "200") {
              $probeResp = Get-Content $probeBodyPath -Raw
              break
            }

            if ("$lastProbeStatus" -eq "401" -or "$lastProbeStatus" -eq "403") {
              Write-Host "::error::DB probe failed with HTTP $lastProbeStatus after login. Check API auth/session handling."
              exit 1
            }

            if ($attempt -lt $probeMaxAttempts) {
              Write-Host "::warning::DB probe attempt $attempt/$probeMaxAttempts failed with HTTP $lastProbeStatus and curl exit $curlExit; retrying in 20s."
              Start-Sleep -Seconds 20
            }
          }

          if ($null -eq $probeResp) {
            Write-Host "::error::DB probe failed after retries with HTTP $lastProbeStatus. Check API logs and migration status."
            exit 1
          }

          $raw = $probeResp | ConvertFrom-Json
          $data = if ($null -ne $raw.data) { $raw.data } else { $raw }
          $count = if ($null -ne $data.appliedMigrationsCount) { "$($data.appliedMigrationsCount)" } else { "?" }
          $strategyRuns = if ($null -ne $data.tables -and $null -ne $data.tables.strategy_runs) { "$($data.tables.strategy_runs)" } else { "?" }

          Write-Host "::notice::Applied migrations: $count | strategy_runs table: $strategyRuns | sha: ${{ github.sha }}"

          if ($strategyRuns -eq "False" -or $strategyRuns -eq "false") {
            Write-Host "::error::strategy_runs table NOT present after deploy - migration may have failed. Check Railway logs."
            exit 1
          }

          # Hard check: migration count must include the required schema baseline.
          # Current prod value: 45 (6/5 PR #1008, migration 0044 ai_rec_pick_snapshots).
          # Repo has 44 current forward files through 0044, prod schema_migrations contains
          # 1 legacy applied row from earlier migration history = 44 + 1 = 45 total.
          $expectedMigrationCount = "45"
          if ([int]$count -lt [int]$expectedMigrationCount) {
            Write-Host "::error::Migration count too low: expected at least $expectedMigrationCount but got $count. Check Railway boot logs for advisory lock contention or migration errors."
            exit 1
          }
          if ([int]$count -gt [int]$expectedMigrationCount) {
            Write-Host "::warning::Migration count ahead of deploy verifier: expected $expectedMigrationCount but got $count. Continuing because all required migrations are present; update deploy.yml."
          }

          Write-Host "::notice::Migration count verified: $count/$expectedMigrationCount OK"

      # Post-deploy core-surface verification (root-cause class 4, 2026-06-17).
      # Automates the manual f-auto/quote/overview/brief checks Elva ran by hand.
      # The 6/17 F-AUTO "0 positions" regression (#1089) only showed on the live
      # API after deploy — CI never saw it. This fails the deploy on a core
      # regression instead of waiting for the owner to open the site and find it.
      - name: Verify core product surfaces (api only)
        if: steps.gate.outputs.skip != 'true' && matrix.service == 'api'
        env:
          SEED_OWNER_EMAIL: ${{ secrets.SEED_OWNER_EMAIL }}
          SEED_OWNER_PASSWORD: ${{ secrets.SEED_OWNER_PASSWORD }}
        run: |
          Start-Sleep -Seconds 20
          node scripts/post-deploy-verify.mjs
