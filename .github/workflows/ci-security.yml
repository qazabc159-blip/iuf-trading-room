name: CI — Security Baseline (all PRs)

# Security gate: runs on ALL pull requests, regardless of which files changed.
# No paths filter: these jobs must catch broker write / secret leak on every PR.
#
# W6 No-Real-Order Audit: prevents live broker write code from sneaking in.
# Secret Regression Check: prevents hardcoded secrets / credentials from leaking.
#
# These checks run short Python-only static audits. Keep them on the Taipei
# self-hosted runner so GitHub-hosted quota does not block required checks.
# Windows jobs must not use actions/setup-python because that installer touches
# registry keys the runner service cannot modify.

on:
  pull_request:

concurrency:
  group: ci-security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  w6_audit:
    name: W6 No-Real-Order Audit
    runs-on: ${{ fromJSON('["self-hosted", "iuf-taipei"]') }}
    timeout-minutes: 5
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        if: runner.os != 'Windows'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run W6 no-real-order audit (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          $python = Get-Command python -ErrorAction SilentlyContinue
          if ($python) {
            & $python.Source scripts/audit/w6_no_real_order_audit.py
            exit $LASTEXITCODE
          }

          $py = Get-Command py -ErrorAction SilentlyContinue
          if ($py) {
            & $py.Source -3 scripts/audit/w6_no_real_order_audit.py
            exit $LASTEXITCODE
          }

          Write-Error 'Python 3 is not available on the self-hosted Windows runner. Install Python or set USE_SELF_HOSTED=false.'
          exit 1

      - name: Run W6 no-real-order audit
        if: runner.os != 'Windows'
        run: python scripts/audit/w6_no_real_order_audit.py

  secret_regression:
    name: Secret Regression Check (A2)
    runs-on: ${{ fromJSON('["self-hosted", "iuf-taipei"]') }}
    timeout-minutes: 5
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        if: runner.os != 'Windows'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run secret regression check (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          $python = Get-Command python -ErrorAction SilentlyContinue
          if ($python) {
            & $python.Source scripts/audit/secret_regression_check.py
            exit $LASTEXITCODE
          }

          $py = Get-Command py -ErrorAction SilentlyContinue
          if ($py) {
            & $py.Source -3 scripts/audit/secret_regression_check.py
            exit $LASTEXITCODE
          }

          Write-Error 'Python 3 is not available on the self-hosted Windows runner. Install Python or set USE_SELF_HOSTED=false.'
          exit 1

      - name: Run secret regression check
        if: runner.os != 'Windows'
        run: python scripts/audit/secret_regression_check.py
