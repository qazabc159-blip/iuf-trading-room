name: CI — Security Baseline (all PRs)

# Security gate: runs on ALL pull requests, regardless of which files changed.
# No paths filter — these jobs must catch broker write / secret leak on every PR.
#
# W6 No-Real-Order Audit:  prevents live broker write code from sneaking in
# Secret Regression Check: prevents hardcoded secrets / credentials from leaking
#
# Each job < 10 sec. Total cost per PR ≈ 20 sec combined — negligible quota.

on:
  pull_request:

concurrency:
  group: ci-security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  w6_audit:
    name: W6 No-Real-Order Audit
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run W6 no-real-order audit
        run: python3 scripts/audit/w6_no_real_order_audit.py

  secret_regression:
    name: Secret Regression Check (A2)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run secret regression check
        run: python3 scripts/audit/secret_regression_check.py
