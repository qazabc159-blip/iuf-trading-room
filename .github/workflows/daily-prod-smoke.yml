name: Daily Production Smoke

on:
  schedule:
    # Trading day ticks (Mon-Fri UTC) = 09:30 / 17:30 TST (reduced from 4 to 2)
    - cron: '30 1 * * 1-5'
    - cron: '30 9 * * 1-5'
    # Weekend / holiday single tick = 17:00 TST Sat/Sun
    - cron: '0 9 * * 6,0'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  # Monitoring deliberately runs on GitHub-hosted ubuntu, NOT the self-hosted
  # Taipei EC2 runner: that box is part of the system under test (EventBridge
  # stops it at 14:10 TST daily), so probes scheduled outside its uptime would
  # silently never run.
  skip-check:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
    steps:
      - id: check
        name: Check secrets presence
        shell: pwsh
        # Smoke logs in as SEED_OWNER (same account ci.yml uses). The old
        # IUF_TEST_* secrets pointed at a QA Viewer account that was
        # deactivated on 2026-07-03, which 401'd every run since.
        env:
          IUF_TEST_EMAIL: ${{ secrets.SEED_OWNER_EMAIL }}
          IUF_TEST_PASSWORD: ${{ secrets.SEED_OWNER_PASSWORD }}
        run: |
          $hasEmail = -not [string]::IsNullOrWhiteSpace($env:IUF_TEST_EMAIL)
          $hasPassword = -not [string]::IsNullOrWhiteSpace($env:IUF_TEST_PASSWORD)
          if ($hasEmail -and $hasPassword) {
            Add-Content -LiteralPath $env:GITHUB_OUTPUT -Value 'should_run=true' -Encoding UTF8
          } else {
            Add-Content -LiteralPath $env:GITHUB_OUTPUT -Value 'should_run=false' -Encoding UTF8
            Write-Host 'SKIPPED_MISSING_TEST_SECRETS - set SEED_OWNER_EMAIL and SEED_OWNER_PASSWORD in repo secrets.'
          }

  run-smoke:
    needs: skip-check
    if: ${{ needs.skip-check.outputs.should_run == 'true' }}
    runs-on: ubuntu-latest
    env:
      IUF_TEST_EMAIL: ${{ secrets.SEED_OWNER_EMAIL }}
      IUF_TEST_PASSWORD: ${{ secrets.SEED_OWNER_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      # The smoke MUST run on every runner OS. The old version skipped the whole
      # harness on Linux runners but still reported SMOKE_FAILED=false — a fake
      # green that let real outages go unnoticed for days (6/11 audit C4). The
      # harness is plain PowerShell REST probing and runs fine under pwsh on
      # ubuntu; invoking the script directly (not via powershell.exe) makes it
      # OS-independent.
      - name: Run Production Smoke (12-item ETL freshness)
        id: prod_smoke
        shell: pwsh
        run: |
          $ts = (Get-Date -Format "yyyyMMdd-HHmm")
          $out = "evidence/w7_paper_sprint/gha_prod_smoke_$ts.md"
          # In-process invocation: a failing harness calls `exit 1` which ends this
          # step with a failure outcome directly — no exit-code relay needed.
          & ./scripts/verify/Invoke-ProductionSmoke.ps1 -OutFile $out
          Add-Content -LiteralPath $env:GITHUB_ENV -Value ('PROD_SMOKE_OUT={0}' -f $out) -Encoding UTF8
        continue-on-error: true

      - name: Check overall result
        id: result_check
        shell: pwsh
        run: |
          $failed = @()
          if ('${{ steps.prod_smoke.outcome }}' -eq 'failure') { $failed += 'prod' }
          if ($failed.Count -gt 0) {
            Add-Content -LiteralPath $env:GITHUB_ENV -Value 'SMOKE_FAILED=true' -Encoding UTF8
            Add-Content -LiteralPath $env:GITHUB_ENV -Value ('SMOKE_FAIL_LIST={0}' -f ($failed -join ',')) -Encoding UTF8
          } else {
            Add-Content -LiteralPath $env:GITHUB_ENV -Value 'SMOKE_FAILED=false' -Encoding UTF8
            Add-Content -LiteralPath $env:GITHUB_ENV -Value 'SMOKE_FAIL_LIST=' -Encoding UTF8
          }

      - name: Upload smoke artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: smoke-results-${{ github.run_id }}
          path: |
            evidence/w7_paper_sprint/gha_prod_smoke_*.md
            evidence/w7_paper_sprint/bruce_powershell_smoke_harness_*.md
          retention-days: 30
          if-no-files-found: warn

      - name: Alert on failure (dedupe standing issue)
        if: env.SMOKE_FAILED == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const failList = process.env.SMOKE_FAIL_LIST || 'unknown';
            const runUrl   = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const now      = new Date();
            const newBody  = `### Daily Smoke FAIL - ${now.toISOString()}\n\n` +
                             `**Failed lanes:** ${failList}\n` +
                             `**Run:** ${runUrl}\n\n` +
                             `Investigate stop-lines in smoke artifact before next trading session.`;

            const STANDING_LABEL = 'standing-smoke-alert';

            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              state: 'open',
              labels: STANDING_LABEL,
              per_page: 1,
            });

            let standingIssue = issues.length > 0 ? issues[0] : null;

            if (!standingIssue) {
              const initialBody = `# Smoke Alert - Standing Issue\n\n` +
                `This issue is the single standing alert for daily production smoke failures.\n` +
                `All subsequent failures will append comments here instead of opening new issues.\n\n` +
                `---\n\n` + newBody;
              const created = await github.rest.issues.create({
                owner:  context.repo.owner,
                repo:   context.repo.repo,
                title:  '[SMOKE ALERT] Standing daily smoke failure tracker',
                body:   initialBody,
                labels: ['smoke-fail', 'needs-triage', STANDING_LABEL],
              });
              console.log(`Created standing smoke issue #${created.data.number}`);
              return;
            }

            const cutoff24h = new Date(now.getTime() - 24 * 60 * 60 * 1000);
            const { data: recentComments } = await github.rest.issues.listComments({
              owner:     context.repo.owner,
              repo:      context.repo.repo,
              issue_number: standingIssue.number,
              per_page:  10,
            });

            const alreadyCommented = recentComments.some(c => {
              const commentAge = new Date(c.created_at);
              return commentAge > cutoff24h && c.body.includes(`**Failed lanes:** ${failList}`);
            });

            if (alreadyCommented) {
              console.log(`Dedupe: smoke failure for "${failList}" already reported within 24 h on #${standingIssue.number} - skipping comment.`);
              return;
            }

            await github.rest.issues.createComment({
              owner:        context.repo.owner,
              repo:         context.repo.repo,
              issue_number: standingIssue.number,
              body:         newBody,
            });
            console.log(`Appended smoke failure comment to standing issue #${standingIssue.number}`);

      - name: Fail workflow on smoke failure
        if: env.SMOKE_FAILED == 'true'
        shell: pwsh
        run: exit 1
