name: Daily Production Smoke

on:
  schedule:
    # Trading day ticks (Mon-Fri UTC) = 09:30 / 17:30 TST (reduced from 4 to 2)
    - cron: '30 1 * * 1-5'
    - cron: '30 9 * * 1-5'
    # Weekend / holiday single tick = 17:00 TST Sat/Sun
    - cron: '0 9 * * 6,0'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  skip-check:
    runs-on: ${{ vars.USE_SELF_HOSTED == 'false' && 'ubuntu-latest' || fromJSON('["self-hosted", "iuf-prod"]') }}
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
    steps:
      - id: check
        name: Check secrets presence
        shell: powershell
        env:
          IUF_TEST_EMAIL: ${{ secrets.IUF_TEST_EMAIL }}
          IUF_TEST_PASSWORD: ${{ secrets.IUF_TEST_PASSWORD }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:IUF_TEST_EMAIL) -or [string]::IsNullOrWhiteSpace($env:IUF_TEST_PASSWORD)) {
            "should_run=false" >> $env:GITHUB_OUTPUT
            echo "SKIPPED_MISSING_TEST_SECRETS — set IUF_TEST_EMAIL and IUF_TEST_PASSWORD in repo secrets."
          } else {
            "should_run=true" >> $env:GITHUB_OUTPUT
          }

  run-smoke:
    needs: skip-check
    if: ${{ needs.skip-check.outputs.should_run == 'true' }}
    runs-on: ${{ vars.USE_SELF_HOSTED == 'false' && 'ubuntu-latest' || fromJSON('["self-hosted", "iuf-prod"]') }}
    env:
      IUF_TEST_EMAIL: ${{ secrets.IUF_TEST_EMAIL }}
      IUF_TEST_PASSWORD: ${{ secrets.IUF_TEST_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - name: Run Production Smoke (12-item ETL freshness)
        id: prod_smoke
        shell: powershell
        run: |
          if ($env:RUNNER_OS -eq 'Windows') {
            $ts = (Get-Date -Format "yyyyMMdd-HHmm")
            $out = "evidence/w7_paper_sprint/gha_prod_smoke_$ts.md"
            pwsh -NoProfile -ExecutionPolicy Bypass `
              -File scripts/verify/Invoke-ProductionSmoke.ps1 `
              -OutFile $out
            "PROD_SMOKE_OUT=$out" >> $env:GITHUB_ENV
          } else {
            Write-Host "Note: Linux runner selected (reduced cost). For full Windows smoke, manually dispatch workflow."
            "PROD_SMOKE_OUT=skipped" >> $env:GITHUB_ENV
          }
        continue-on-error: true

      - name: Check overall result
        id: result_check
        shell: powershell
        run: |
          if ($env:RUNNER_OS -eq 'Windows') {
            $failed = @()
            if ('${{ steps.prod_smoke.outcome }}'  -eq 'failure') { $failed += 'prod' }
            if ($failed.Count -gt 0) {
              "SMOKE_FAILED=true"  >> $env:GITHUB_ENV
              "SMOKE_FAIL_LIST=$($failed -join ',')" >> $env:GITHUB_ENV
            } else {
              "SMOKE_FAILED=false" >> $env:GITHUB_ENV
              "SMOKE_FAIL_LIST=" >> $env:GITHUB_ENV
            }
          } else {
            "SMOKE_FAILED=false" >> $env:GITHUB_ENV
            "SMOKE_FAIL_LIST=" >> $env:GITHUB_ENV
          }

      - name: Upload smoke artifacts
        uses: actions/upload-artifact@v4
        if: always() && runner.os == 'Windows'
        with:
          name: smoke-results-${{ github.run_id }}
          path: |
            evidence/w7_paper_sprint/gha_prod_smoke_*.md
            evidence/w7_paper_sprint/bruce_powershell_smoke_harness_*.md
          retention-days: 30

      - name: Alert on failure (dedupe standing issue)
        if: env.SMOKE_FAILED == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const failList = process.env.SMOKE_FAIL_LIST || 'unknown';
            const runUrl   = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const now      = new Date();
            const newBody  = `### Daily Smoke FAIL — ${now.toISOString()}\n\n` +
                             `**Failed lanes:** ${failList}\n` +
                             `**Run:** ${runUrl}\n\n` +
                             `Investigate stop-lines in smoke artifact before next trading session.`;

            const STANDING_LABEL = 'standing-smoke-alert';

            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              state: 'open',
              labels: STANDING_LABEL,
              per_page: 1,
            });

            let standingIssue = issues.length > 0 ? issues[0] : null;

            if (!standingIssue) {
              const initialBody = `# Smoke Alert — Standing Issue\n\n` +
                `This issue is the single standing alert for daily production smoke failures.\n` +
                `All subsequent failures will append comments here instead of opening new issues.\n\n` +
                `---\n\n` + newBody;
              const created = await github.rest.issues.create({
                owner:  context.repo.owner,
                repo:   context.repo.repo,
                title:  '[SMOKE ALERT] Standing daily smoke failure tracker',
                body:   initialBody,
                labels: ['smoke-fail', 'needs-triage', STANDING_LABEL],
              });
              console.log(`Created standing smoke issue #${created.data.number}`);
              return;
            }

            const cutoff24h = new Date(now.getTime() - 24 * 60 * 60 * 1000);
            const { data: recentComments } = await github.rest.issues.listComments({
              owner:     context.repo.owner,
              repo:      context.repo.repo,
              issue_number: standingIssue.number,
              per_page:  10,
            });

            const alreadyCommented = recentComments.some(c => {
              const commentAge = new Date(c.created_at);
              return commentAge > cutoff24h && c.body.includes(`**Failed lanes:** ${failList}`);
            });

            if (alreadyCommented) {
              console.log(`Dedupe: smoke failure for "${failList}" already reported within 24 h on #${standingIssue.number} — skipping comment.`);
              return;
            }

            await github.rest.issues.createComment({
              owner:        context.repo.owner,
              repo:         context.repo.repo,
              issue_number: standingIssue.number,
              body:         newBody,
            });
            console.log(`Appended smoke failure comment to standing issue #${standingIssue.number}`);

      - name: Fail workflow on smoke failure
        if: env.SMOKE_FAILED == 'true'
        shell: powershell
        run: exit 1
