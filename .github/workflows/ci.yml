name: CI — Validate (code changes only)

# Paths filter: validate job only runs when actual code changes are present.
# Pure docs/reports/evidence/memo PRs skip validate entirely (no quota burn).
#
# Security baseline jobs (W6 no-real-order audit + Secret Regression) are in
# ci-security.yml — they run on ALL PRs regardless of changed paths.
#
# [skip ci] in commit message also skips this workflow (GHA native).
#
# db-tests job (#1183/#1185 follow-up, 2026-07-09): runs the subset of
# apps/api/src tests that require a real Postgres connection (PERSISTENCE_MODE=
# database). These were previously outside CI entirely — memory-mode `pnpm test`
# cannot exercise them. NOT wired into branch-protection required checks yet
# (see job comment) — first live run surfaced pre-existing test-file bugs
# unrelated to DB availability; flip to required once those are fixed.

on:
  push:
    branches:
      - main
    paths:
      - 'apps/**'
      - 'packages/**'
      - 'tests/**'
      - 'scripts/**'
      - '.github/workflows/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'turbo.json'
      - 'tsconfig*.json'
      - '.npmrc'
  pull_request:
    paths:
      - 'apps/**'
      - 'packages/**'
      - 'tests/**'
      - 'scripts/**'
      - '.github/workflows/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'turbo.json'
      - 'tsconfig*.json'
      - '.npmrc'

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    # EC2 self-hosted runner (Windows Server 2022, i-03762861d4ce08932, ap-east-2)
    # Saves GHA hosted-runner quota — runner labels: self-hosted, Windows, X64, iuf-prod
    # Toggle: set repo var USE_SELF_HOSTED=false to fall back to ubuntu-latest (e.g. if EC2 is down)
    runs-on: ${{ vars.USE_SELF_HOSTED == 'false' && 'ubuntu-latest' || fromJSON('["self-hosted", "iuf-taipei"]') }}
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          package-manager-cache: false

      - name: Enable Corepack
        run: corepack enable

      - name: Activate pnpm
        run: corepack prepare pnpm@10.29.2 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      # Root-cause guard (2026-06-17): block the postgres-js ".rows silent-zero"
      # bug class — db.execute() returns a bare array, so reading .rows is a
      # silent empty. Forces execRows() from @iuf-trading-room/db instead.
      - name: DB execRows guard
        run: pnpm check:db-execrows

      - name: Build
        run: pnpm build

      # No continue-on-error: unit tests are a real gate. The old escape made
      # the validate job pass while the log printed "not ok" (REC10 /
      # REC-LOWER-THRESHOLD-1 failed silently for weeks — 假綠燈).
      - name: Test
        run: pnpm test

      - name: Smoke
        run: pnpm smoke

  db-tests:
    name: DB-mode Tests (Postgres)
    # GHA `services:` (Docker service containers) only work on Linux runners.
    # The self-hosted EC2 runner used by `validate` above is Windows Server
    # 2022 and cannot host a postgres service container — this job stays on
    # GitHub-hosted ubuntu-latest intentionally, independent of USE_SELF_HOSTED.
    #
    # Status: NOT in branch-protection required checks yet. First real run
    # (2026-07-09, local repro against postgres:16-alpine + full migration set)
    # found idempotency-race.test.ts / paper-executor.test.ts /
    # strategy-ideas.test.ts fail even with a live DB — root cause is two
    # pre-existing test-file bugs unrelated to DB availability (see PR body):
    #   1. All three import ledger state from the legacy in-memory
    #      domain/trading/paper-ledger.js, but order-driver.ts has written
    #      through domain/trading/paper-ledger-db.js since the W8 2026-05-05
    #      migration — the tests read a Map that is never written to.
    #   2. paper-executor.test.ts A2/A3 assert the old hardcoded fallback-
    #      price-100.0 fill behavior that was deliberately removed (see
    #      "HARD LINE: never fill at a hardcoded fake price" comment in
    #      paper-executor.ts) — DB mode now correctly REJECTs with
    #      no_price_available since no OHLCV row is seeded.
    # This job's job is to give these tests a place to run, not to fix them.
    # Flip to required once a test-owner (Jason lane) fixes the two issues
    # above; until then treat this job's result as informational.
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: iuf
          POSTGRES_PASSWORD: iuf
          POSTGRES_DB: iuf_ci_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U iuf"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10
    env:
      DATABASE_URL: postgresql://iuf:iuf@localhost:5432/iuf_ci_test
      PERSISTENCE_MODE: database

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          package-manager-cache: false

      - name: Enable Corepack
        run: corepack enable

      - name: Activate pnpm
        run: corepack prepare pnpm@10.29.2 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm run build:packages

      # alerts-audience-auth.test.ts (2026-07-11 follow-up) boots the real
      # apps/api/src/server.ts as a child process — the first test:db file to
      # do so; the other 3 db-tests files only call domain-layer functions
      # directly. server.ts imports @iuf-trading-room/integrations, which
      # `build:packages` above does not build (its filter list predates any
      # test:db file needing a server boot) — without this, the spawned
      # server crashes at import time with ERR_MODULE_NOT_FOUND and every
      # test in that file times out waiting for /health. Scoped to this job
      # only; the shared `build:packages` script (also used by
      # dev/build:web) is left untouched.
      - name: Build integrations package (server boot dependency)
        run: pnpm turbo run build --filter=@iuf-trading-room/integrations

      - name: Run migrations
        run: pnpm run migrate

      - name: DB-mode tests
        run: pnpm run test:db

  qa-playwright-smoke:
    name: Playwright P0 Smoke
    runs-on: ${{ vars.USE_SELF_HOSTED == 'false' && 'ubuntu-latest' || fromJSON('["self-hosted", "iuf-taipei"]') }}
    timeout-minutes: 12
    permissions:
      contents: read
    env:
      # Pull requests must validate the checked-out branch, not stale production.
      # Daily Production Smoke and main pushes still cover the live site.
      IUF_QA_WEB_BASE_URL: ${{ github.event_name == 'pull_request' && 'http://127.0.0.1:3300' || 'https://app.eycvector.com' }}
      IUF_QA_API_BASE_URL: https://api.eycvector.com
      IUF_QA_OWNER_EMAIL: ${{ secrets.SEED_OWNER_EMAIL }}
      IUF_QA_OWNER_PASSWORD: ${{ secrets.SEED_OWNER_PASSWORD }}
      NEXT_PUBLIC_API_BASE_URL: https://api.eycvector.com
      NEXT_PUBLIC_DEFAULT_WORKSPACE_SLUG: primary-desk

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          package-manager-cache: false

      - name: Enable Corepack
        run: corepack enable

      - name: Activate pnpm
        run: corepack prepare pnpm@10.29.2 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Chromium
        run: pnpm --filter @iuf-trading-room/qa-playwright exec playwright install chromium

      - name: Start PR web app for Playwright (Windows)
        if: github.event_name == 'pull_request' && runner.os == 'Windows'
        shell: powershell
        run: |
          $pnpm = "pnpm.cmd"
          $startArgs = @{
            FilePath = $pnpm
            ArgumentList = @("--filter","@iuf-trading-room/web","exec","next","dev","-p","3300")
            WorkingDirectory = "$env:GITHUB_WORKSPACE"
            WindowStyle = "Hidden"
          }
          Start-Process @startArgs
          for ($i = 0; $i -lt 90; $i++) {
            try {
              $response = Invoke-WebRequest -Uri "http://127.0.0.1:3300/market-intel" -UseBasicParsing -TimeoutSec 2
              if ($response.StatusCode -ge 200 -and $response.StatusCode -lt 500) {
                Write-Host "PR web app ready on http://127.0.0.1:3300"
                exit 0
              }
            } catch {
              Start-Sleep -Seconds 1
            }
          }
          throw "PR web app did not become ready on port 3300"

      - name: Start PR web app for Playwright (Linux)
        if: github.event_name == 'pull_request' && runner.os != 'Windows'
        shell: bash
        run: |
          pnpm --filter @iuf-trading-room/web exec next dev -p 3300 > next-playwright.log 2>&1 &
          for i in {1..90}; do
            status="$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:3300/market-intel || true)"
            if [ "$status" -ge 200 ] && [ "$status" -lt 500 ]; then
              echo "PR web app ready on http://127.0.0.1:3300"
              exit 0
            fi
            sleep 1
          done
          echo "PR web app did not become ready on port 3300"
          tail -120 next-playwright.log || true
          exit 1

      - name: Market Intel smoke
        run: pnpm qa:playwright:smoke

      - name: Upload Playwright screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qa-playwright-smoke
          path: |
            reports/qa_playwright_*/
            packages/qa-playwright/playwright-report/
            packages/qa-playwright/test-results/
