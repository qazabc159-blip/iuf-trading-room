name: CI — Validate (code changes only)

# Paths filter: validate job only runs when actual code changes are present.
# Pure docs/reports/evidence/memo PRs skip validate entirely (no quota burn).
#
# Security baseline jobs (W6 no-real-order audit + Secret Regression) are in
# ci-security.yml — they run on ALL PRs regardless of changed paths.
#
# [skip ci] in commit message also skips this workflow (GHA native).

on:
  push:
    branches:
      - main
    paths:
      - 'apps/**'
      - 'packages/**'
      - 'tests/**'
      - 'scripts/**'
      - '.github/workflows/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'turbo.json'
      - 'tsconfig*.json'
      - '.npmrc'
  pull_request:
    paths:
      - 'apps/**'
      - 'packages/**'
      - 'tests/**'
      - 'scripts/**'
      - '.github/workflows/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'turbo.json'
      - 'tsconfig*.json'
      - '.npmrc'

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    # EC2 self-hosted runner (Windows Server 2022, i-03762861d4ce08932, ap-east-2)
    # Saves GHA hosted-runner quota — runner labels: self-hosted, Windows, X64, iuf-prod
    # Toggle: set repo var USE_SELF_HOSTED=false to fall back to ubuntu-latest (e.g. if EC2 is down)
    runs-on: ${{ vars.USE_SELF_HOSTED == 'false' && 'ubuntu-latest' || fromJSON('["self-hosted", "iuf-prod"]') }}
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          package-manager-cache: false

      - name: Enable Corepack
        run: corepack enable

      - name: Activate pnpm
        run: corepack prepare pnpm@10.29.2 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

      - name: Smoke
        run: pnpm smoke
